<svg width="100%" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Grille -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ff0033" stroke-width="0.4" opacity="0.25"/>
    </pattern>

    <!-- Scanline -->
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,0,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,0,0,0)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="#050505"/>
  <rect width="1200" height="260" fill="url(#grid)"/>

  <!-- Scanline animée -->
  <rect width="1200" height="260" fill="url(#scan)">
    <animate attributeName="y" values="-260;260" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Titre -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
        font-family="Consolas, monospace" font-size="48" fill="#ff0033">
    98731 — Redhat 
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </text>

</svg>
