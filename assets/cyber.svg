<svg width="240" height="48" viewBox="0 0 240 48" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradient animé -->
    <linearGradient id="ynforGrad" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#ff0033">
        <animate attributeName="offset" values="0;1;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#8B0000">
        <animate attributeName="offset" values="0.5;1.5;0.5" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow -->
    <filter id="cyberGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanlines -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(255,0,0,0.15)"/>
    </pattern>
  </defs>

  <!-- Fond global -->
  <rect width="240" height="48" rx="6" fill="#0A0A0A"/>

  <!-- Bloc gauche animé -->
  <rect width="140" height="48" rx="6" fill="url(#ynforGrad)" filter="url(#cyberGlow)"/>

  <!-- Scanlines -->
  <rect width="240" height="48" fill="url(#scan)"/>

  <!-- Texte YnFOR centré (140px → centre = 70) -->
  <text x="70" y="30" text-anchor="middle"
        font-family="Consolas, monospace"
        font-size="20"
        font-weight="bold"
        fill="#FFFFFF"
        stroke="#b300ff"
        stroke-width="1.4">
    YnFOR
  </text>

  <!-- Texte Market centré (100px → centre = 190) -->
  <text x="190" y="30" text-anchor="middle"
        font-family="Consolas, monospace"
        font-size="18"
        font-weight="bold"
        fill="#ff0033"
        stroke="#b300ff"
        stroke-width="1.2">
    Market
  </text>

</svg>
